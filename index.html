<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
    <title>手帖 — 拍照生成手帐</title>
    <script type="module" crossorigin src="/photo-journal/assets/index-D1ivQAwp.js"></script>
    <link rel="stylesheet" crossorigin href="/photo-journal/assets/index-D9PdlYxV.css">
  </head>
  <body>
    <div id="app"></div>
    <div id="errors" style="position:fixed;bottom:0;left:0;right:0;background:#ffebee;color:#b71c1c;padding:12px;font-size:12px;display:none;z-index:9999;max-height:200px;overflow:auto"></div>
    <script>
      window.onerror = function(msg, url, line, col, err) {
        var el = document.getElementById('errors');
        el.style.display = 'block';
        el.innerHTML += '<div><b>Error:</b> ' + msg + '<br><small>' + url + ':' + line + '</small></div>';
      };
      window.addEventListener('unhandledrejection', function(e) {
        var el = document.getElementById('errors');
        el.style.display = 'block';
        el.innerHTML += '<div><b>Promise Error:</b> ' + e.reason + '</div>';
      });
    </script>
  </body>
</html>
